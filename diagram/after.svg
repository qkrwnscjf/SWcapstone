<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff" />
  
  <!-- Title -->
  <text x="500" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2d3748">AFTER: 중앙 집중형 MLOps 에코시스템 (Dynamic &amp; Scalable)</text>

  <!-- Component: Central Artifact Registry -->
  <g transform="translate(50, 150)">
    <rect width="300" height="350" rx="20" fill="#f0fff4" stroke="#38a169" stroke-width="3" />
    <text x="150" y="40" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#22543d">Central Registry (S3/MinIO)</text>
    
    <!-- Model Cloud -->
    <path d="M 100 120 Q 150 70, 200 120 Q 250 120, 250 160 Q 250 200, 200 200 H 100 Q 50 200, 50 160 Q 50 120, 100 120 Z" fill="#e6fffa" stroke="#319795" stroke-width="2" />
    <text x="150" y="155" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c7a7b">Model Artifacts</text>
    <text x="150" y="175" font-family="Arial" font-size="11" text-anchor="middle" fill="#2c7a7b">v1, v2, v3... Latest</text>
    
    <!-- Database Icon -->
    <rect x="100" y="240" width="100" height="80" rx="10" fill="#2d3748" />
    <text x="150" y="275" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">SQL DB</text>
    <text x="150" y="295" font-family="Arial" font-size="10" text-anchor="middle" fill="#90cdf4">Metadata / Logs</text>
  </g>

  <!-- Interactive Control Flow -->
  <path d="M 350 250 Q 450 150, 550 250" fill="none" stroke="#38a169" stroke-width="4" marker-end="url(#arrowhead)" />
  <text x="450" y="180" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2f855a">Pull Any Version</text>

  <path d="M 550 350 Q 450 450, 350 350" fill="none" stroke="#3182ce" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="450" y="430" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Auto Push After Retrain</text>

  <!-- Component: Modern Backend -->
  <g transform="translate(600, 150)">
    <rect width="350" height="350" rx="20" fill="#ebf8ff" stroke="#3182ce" stroke-width="3" />
    <text x="175" y="40" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c5282">Dynamic Serving Engine</text>
    
    <!-- Model Selector Interface -->
    <rect x="50" y="80" width="250" height="150" rx="15" fill="white" stroke="#3182ce" />
    <text x="175" y="115" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3748">Hot-swap Controller</text>
    
    <!-- Select UI -->
    <rect x="75" y="135" width="200" height="30" rx="5" fill="#edf2f7" stroke="#cbd5e0" />
    <text x="85" y="155" font-family="Arial" font-size="10">Select Model: v3.2-final</text>
    <polygon points="260,145 270,145 265,155" fill="#4a5568" />

    <text x="175" y="210" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#27ae60">No Restart Required</text>
  </g>

  <!-- Success Indicator -->
  <circle cx="950" cy="300" r="40" fill="#f0fff4" stroke="#38a169" stroke-width="2" />
  <text x="950" y="305" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#2f855a">✓</text>
  <text x="950" y="360" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2f855a">유연한 확장</text>

  <!-- Arrowhead Def -->
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#38a169" /></marker></defs>
</svg>
