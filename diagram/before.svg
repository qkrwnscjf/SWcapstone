<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff" />
  
  <!-- Title -->
  <text x="500" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2d3748">BEFORE: 로컬 파일 종속형 파이프라인 (Static &amp; Local)</text>

  <!-- Component: Local Disk -->
  <g transform="translate(100, 150)">
    <rect width="250" height="300" rx="15" fill="#f7fafc" stroke="#cbd5e0" stroke-width="2" />
    <text x="125" y="40" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#4a5568">Local Server Disk</text>
    
    <!-- Folder Icon -->
    <path d="M 50 100 H 120 L 140 80 H 200 V 220 H 50 Z" fill="#edf2f7" stroke="#a0aec0" stroke-width="2" />
    <text x="125" y="160" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#718096">/models/*.pt</text>
    
    <!-- Static Link -->
    <rect x="60" y="240" width="130" height="40" rx="5" fill="#fff5f5" stroke="#f56565" />
    <text x="125" y="265" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#c53030">LOCKED: Round_3</text>
  </g>

  <!-- Arrow -->
  <path d="M 350 300 H 450" stroke="#f56565" stroke-width="4" stroke-dasharray="8,4" />
  <text x="400" y="280" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#c53030">Static Path</text>

  <!-- Component: Docker Backend -->
  <g transform="translate(480, 150)">
    <rect width="420" height="300" rx="15" fill="#ebf8ff" stroke="#3182ce" stroke-width="2" />
    <text x="210" y="40" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c5282">FastAPI Backend (Docker)</text>
    
    <rect x="50" y="80" width="320" height="100" rx="10" fill="white" stroke="#3182ce" />
    <text x="210" y="125" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3748">Bootstrapping with Env Variable</text>
    <text x="210" y="150" font-family="Arial" font-size="12" text-anchor="middle" fill="#e53e3e">ENV: GATE_MODEL_PATH=round_3.pt</text>
    
    <rect x="50" y="200" width="150" height="70" rx="10" fill="#edf2f7" stroke="#a0aec0" />
    <text x="125" y="240" font-family="Arial" font-size="12" text-anchor="middle">state.json</text>
  </g>

  <!-- Bottleneck Alert -->
  <circle cx="920" cy="300" r="40" fill="#fff5f5" stroke="#f56565" stroke-width="2" />
  <text x="920" y="305" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#c53030">!</text>
  <text x="920" y="360" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#c53030">확장 불가능</text>
</svg>
