<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1000" fill="#fcfcfc" />
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#2d3748">SteelVision: Integrated MLOps Data &amp; System Flow</text>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#718096">실시간 이단 추론 및 데이터 중심 학습 선순환 파이프라인 (v3.5)</text>

  <!-- Zone A: Field Operation (Real-time Inference) -->
  <rect x="40" y="130" width="340" height="820" rx="15" fill="#ebf8ff" stroke="#3182ce" stroke-width="2" />
  <text x="210" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c5282">1. 현장 운영 및 추론 엔진</text>
  
  <g transform="translate(60, 200)">
    <!-- Inference Box -->
    <rect width="300" height="150" rx="10" fill="white" stroke="#3182ce" />
    <text x="15" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2b6cb0">이단 추론 (Cascade)</text>
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• [Gate] 1차 고속 스크리닝</text>
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• [HM] 2차 정밀 이상 탐지</text>
    <text x="20" y="110" font-family="Arial, sans-serif" font-size="13" fill="#2c5282" font-weight="bold">→ 지연 시간 단축 &amp; 정밀도 확보</text>

    <!-- UI/HMI Box -->
    <rect y="180" width="300" height="120" rx="10" fill="white" stroke="#3182ce" />
    <text x="15" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2b6cb0">사용자 경험 (UX)</text>
    <text x="20" y="240" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• 실시간 히트맵 오버레이 출력</text>
    <text x="20" y="265" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• vLLM 기반 결함 상세 진단</text>

    <!-- Feedback Button -->
    <rect y="330" width="300" height="80" rx="10" fill="#fff5f5" stroke="#e53e3e" stroke-width="2" />
    <text x="150" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c53030">작업자 피드백 생성</text>
  </g>

  <!-- Zone B: Storage Layer (Persistence) -->
  <rect x="430" y="130" width="340" height="820" rx="15" fill="#fdf2e9" stroke="#e67e22" stroke-width="2" />
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#7b341e">2. 영속적 데이터 계층 (Storage)</text>

  <g transform="translate(450, 200)">
    <!-- Assets Folder -->
    <rect width="300" height="200" rx="10" fill="white" stroke="#e67e22" />
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#d35400">물리 저장소 (/assets)</text>
    <rect x="20" y="60" width="120" height="110" rx="5" fill="#fffaf0" stroke="#fbd38d" />
    <text x="80" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">feedback/</text>
    <text x="80" y="120" font-family="Arial, sans-serif" font-size="11" fill="#718096">오답 이미지</text>
    
    <rect x="160" y="60" width="120" height="110" rx="5" fill="#fffaf0" stroke="#fbd38d" />
    <text x="220" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">uploads/</text>
    <text x="220" y="120" font-family="Arial, sans-serif" font-size="11" fill="#718096">대량 적재 데이터</text>

    <!-- State.json -->
    <rect y="230" width="300" height="320" rx="10" fill="#2d3748" stroke="#1a202c" />
    <text x="150" y="265" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">state.json (메타데이터)</text>
    <text x="20" y="300" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">• Dataset Lineage (이력)</text>
    <text x="20" y="330" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">• Model Performance Metrics</text>
    <text x="20" y="360" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">• Feedback Index (오답 라벨)</text>
    <text x="20" y="390" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e0">• 시스템 트랜잭션 로그</text>
    <rect x="20" y="420" width="260" height="100" rx="5" fill="#4a5568" />
    <text x="150" y="460" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#63b3ed">"데이터와 모델의</text>
    <text x="150" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#63b3ed">인과관계를 영구 기록"</text>
  </g>

  <!-- Zone C: MLOps Control (Improvement) -->
  <rect x="820" y="130" width="340" height="820" rx="15" fill="#f0fff4" stroke="#38a169" stroke-width="2" />
  <text x="990" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#22543d">3. 모델 개선 및 관리 센터</text>

  <g transform="translate(840, 200)">
    <!-- Retrain Box -->
    <rect width="300" height="150" rx="10" fill="white" stroke="#38a169" />
    <text x="15" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2f855a">재학습 엔진 (Retrain)</text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• [Post] 재학습 버튼 클릭</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• 정제된 데이터셋 기반 가중치 갱신</text>
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• 신규 .pt 가중치 파일 생성</text>

    <!-- Hot-swap Box -->
    <rect y="180" width="300" height="150" rx="10" fill="white" stroke="#38a169" />
    <text x="15" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2f855a">실시간 배포 (Hot-swap)</text>
    <text x="20" y="250" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• 원하는 가중치 파일 선택</text>
    <text x="20" y="275" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">• 메모리 즉시 로드 (No Restart)</text>
    <text x="20" y="300" font-family="Arial, sans-serif" font-size="13" fill="#2f855a" font-weight="bold">→ 현장 가동 중단 없는 배포</text>
  </g>

  <!-- Flow Arrows & Labels -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#95a5a6" />
    </marker>
  </defs>

  <!-- Feedback Flow -->
  <line x1="210" y1="610" x2="210" y2="980" stroke="#e53e3e" stroke-width="2" />
  <line x1="210" y1="980" x2="600" y2="980" stroke="#e53e3e" stroke-width="2" />
  <line x1="600" y1="980" x2="600" y2="950" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="400" y="970" font-family="Arial" font-size="12" font-weight="bold" fill="#c53030">Feedback Ingestion (Image + Meta)</text>

  <!-- Training Data Source Flow -->
  <path d="M 600 200 Q 600 110, 840 250" fill="none" stroke="#38a169" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <text x="720" y="160" font-family="Arial" font-size="12" font-weight="bold" fill="#2f855a" text-anchor="middle">Data Pull for Retrain</text>

  <!-- Hot-swap Loading Flow -->
  <path d="M 990 350 Q 990 450, 430 450" fill="none" stroke="#2b6cb0" stroke-width="3" marker-end="url(#arrow)" />
  <text x="810" y="440" font-family="Arial" font-size="14" font-weight="bold" fill="#2b6cb0">Dynamic Weight Hot-loading</text>

</svg>
