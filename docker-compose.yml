services:
  backend:
    build: ./backend
    container_name: steelvision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./splits:/app/splits
      - ./models:/app/models
      - ./storage:/app/storage
      - ./src:/app/src_host  # 필요시 원본 소스 참조용
    environment:
      - GATE_MODEL_PATH=/app/models/round3_effnetb0_gate.pt
      - HEATMAP_MODEL_PATH=/app/models/round3_patchcore_r18_patchcore.pt
      - SERVE_HOST=0.0.0.0
      - SERVE_PORT=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: steelvision-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]