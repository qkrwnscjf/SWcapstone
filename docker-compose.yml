services:
  backend:
    build: ./backend
    container_name: steelvision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./splits:/app/splits
      - ./models:/app/models
      - ./storage:/app/storage
    environment:
      - STORAGE_TYPE=S3
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_MODELS=models
      - S3_BUCKET_DATASETS=datasets
      - S3_BUCKET_FEEDBACK=feedback
      - BOOTSTRAP_STRATEGY=LATEST
      - SERVE_HOST=0.0.0.0
      - SERVE_PORT=8000
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: steelvision-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: steelvision-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      - backend

volumes:
  minio_data:
